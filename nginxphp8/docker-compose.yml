version: '3.9'
services:
  web-robtesting:
    image: nginx:latest
    ports:
      - '8080:80'
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    links:
      - php-80-fpm-robtesting
  php-80-fpm-robtesting:
    build: ./docker/php
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
  database_robtesting:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: deniseforum
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: 1
    ports:
      - '3306:3306'
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql