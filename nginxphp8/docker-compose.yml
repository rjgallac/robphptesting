version: '3.9'
services:
  web-robtesting:
    image: nginx:latest
    ports:
      - '8080:80'
    volumes:
      - ./src:/var/www/html
      - ./config/default.conf:/etc/nginx/conf.d/default.conf
    links:
      - php-80-fpm-robtesting
  php-80-fpm-robtesting:
    build: ./docker/php
    volumes:
      - ./src:/var/www/html
  database_robtesting:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: deniseforum
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - '3306:3306'